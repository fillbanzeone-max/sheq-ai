function UserManagement(){
  const {users,setUsers,canAccess,logAction,genId,currentUser} = useApp();
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [confirmDeactivate,setConfirmDeactivate] = useState(null);
  const [search,setSearch] = useState("");
  const [form,setForm] = useState({name:"",email:"",password:"",role:"Staff Auditor",department:"Internal Audit",active:true,avatar:""});

  if(!canAccess(["CAE"])){ return <div className="text-center py-16 text-gray-400"><div className="text-4xl mb-3">&#128274;</div><p className="font-medium">Access Restricted</p><p className="text-sm mt-1">Only the CAE can access user management.</p></div>; }

  const ROLES=["CAE","Audit Manager","Senior Auditor","Staff Auditor","Auditee"];
  const DEPARTMENTS=["Internal Audit","Finance","Operations","HR","IT","Legal","Compliance"];
  const roleColors={CAE:"bg-purple-100 text-purple-800","Audit Manager":"bg-blue-100 text-blue-800","Senior Auditor":"bg-indigo-100 text-indigo-800","Staff Auditor":"bg-cyan-100 text-cyan-800","Auditee":"bg-orange-100 text-orange-800"};
  const avatarColors=["bg-blue-500","bg-indigo-500","bg-purple-500","bg-teal-500","bg-orange-500","bg-pink-500"];

  const filtered=users.filter(u=>u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase())||u.role.toLowerCase().includes(search.toLowerCase()));

  function openNew(){ setForm({name:"",email:"",password:"temp123",role:"Staff Auditor",department:"Internal Audit",active:true,avatar:""}); setEditing(null); setShowModal(true); }
  function openEdit(u){ setForm({name:u.name,email:u.email,password:u.password,role:u.role,department:u.department,active:u.active,avatar:u.avatar}); setEditing(u); setShowModal(true); }
  function save(){
    if(!form.name.trim()||!form.email.trim())return;
    const initials=form.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
    const avatar=form.avatar||initials;
    if(editing){
      setUsers(prev=>prev.map(u=>u.id===editing.id?{...u,...form,avatar}:u));
      logAction("User Updated","Updated user: "+form.name);
    }else{
      setUsers(prev=>[...prev,{id:genId("u"),...form,avatar}]);
      logAction("User Created","Created user: "+form.name+" ("+form.role+")");
    }
    setShowModal(false);
  }
  function toggleActive(u){
    setUsers(prev=>prev.map(x=>x.id===u.id?{...x,active:!x.active}:x));
    logAction(u.active?"User Deactivated":"User Activated",(u.active?"Deactivated":"Activated")+" user: "+u.name);
    setConfirmDeactivate(null);
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">User Management</h1>
          <p className="text-gray-500 text-sm mt-1">{users.length} users &bull; {users.filter(u=>u.active).length} active</p>
        </div>
        <Btn onClick={openNew}>+ Add User</Btn>
      </div>
      <div className="mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search users..." className="input-field" style={{maxWidth:280}}/>
      </div>
      <Card padding="p-0">
        <table className="w-full">
          <thead><tr className="table-header">
            <th className="px-4 py-3 text-left">User</th>
            <th className="px-4 py-3 text-left">Role</th>
            <th className="px-4 py-3 text-left">Department</th>
            <th className="px-4 py-3 text-left">Email</th>
            <th className="px-4 py-3 text-left">Status</th>
            <th className="px-4 py-3 text-center">Actions</th>
          </tr></thead>
          <tbody>
            {filtered.map((u,i)=>(
              <tr key={u.id} className="table-row">
                <td className="px-4 py-3">
                  <div className="flex items-center gap-3">
                    <Avatar initials={u.avatar} size="sm" color={u.active?avatarColors[i%avatarColors.length]:"bg-gray-300"}/>
                    <div>
                      <p className="font-medium text-sm text-gray-800">{u.name}</p>
                      {u.id===currentUser?.id&&<span className="text-xs text-blue-500">(You)</span>}
                    </div>
                  </div>
                </td>
                <td className="px-4 py-3"><span className={"badge "+(roleColors[u.role]||"bg-gray-100 text-gray-700")}>{u.role}</span></td>
                <td className="px-4 py-3 text-sm text-gray-600">{u.department}</td>
                <td className="px-4 py-3 text-sm text-gray-500">{u.email}</td>
                <td className="px-4 py-3"><StatusBadge status={u.active?"Active":"Inactive"}/></td>
                <td className="px-4 py-3 text-center">
                  <div className="flex gap-2 justify-center">
                    <button onClick={()=>openEdit(u)} className="text-blue-500 hover:text-blue-700 text-xs font-medium">Edit</button>
                    <button onClick={()=>setConfirmDeactivate(u)} className={"text-xs font-medium "+(u.active?"text-red-400 hover:text-red-600":"text-green-500 hover:text-green-700")}>
                      {u.active?"Deactivate":"Activate"}
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <Modal open={showModal} onClose={()=>setShowModal(false)} title={editing?"Edit User":"Add User"}>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Full Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} required/>
          <Inp label="Email" value={form.email} onChange={v=>setForm(p=>({...p,email:v}))} type="email" required/>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Role" value={form.role} onChange={v=>setForm(p=>({...p,role:v}))} options={ROLES}/>
          <Sel label="Department" value={form.department} onChange={v=>setForm(p=>({...p,department:v}))} options={DEPARTMENTS}/>
        </div>
        <Inp label="Password" value={form.password} onChange={v=>setForm(p=>({...p,password:v}))} type="text"/>
        <Inp label="Avatar Initials (e.g. AC)" value={form.avatar} onChange={v=>setForm(p=>({...p,avatar:v.toUpperCase().slice(0,2)}))} placeholder="Auto-generated if blank"/>
        <div className="flex justify-end gap-3 mt-2">
          <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
          <Btn onClick={save}>Save User</Btn>
        </div>
      </Modal>

      <ConfirmDialog
        open={!!confirmDeactivate}
        title={confirmDeactivate?.active?"Deactivate User":"Activate User"}
        message={"Are you sure you want to "+(confirmDeactivate?.active?"deactivate":"activate")+" "+confirmDeactivate?.name+"?"}
        onConfirm={()=>toggleActive(confirmDeactivate)}
        onCancel={()=>setConfirmDeactivate(null)}
      />
    </div>
  );
}

function DocumentManagement(){

  const CATEGORIES=["All","Governance","Methodology","Reports","Working Papers","Templates","Policies"];
  const cats=["Governance","Methodology","Reports","Working Papers","Templates","Policies"];

  const filtered=docs
    .filter(d=>filterCat==="All"||d.category===filterCat)
    .filter(d=>d.name.toLowerCase().includes(search.toLowerCase())||d.description.toLowerCase().includes(search.toLowerCase()));

    setDocs(prev=>prev.filter(x=>x.id!==d.id));

  const fileIcons={Governance:"&#128196;",Methodology:"&#128209;",Reports:"&#128202;","Working Papers":"&#128203;",Templates:"&#128462;",Policies:"&#128220;"};

  return (

          <h1 className="text-2xl font-bold text-gray-900">Document Management</h1>
          <p className="text-gray-500 text-sm mt-1">{docs.length} documents &bull; Audit file repository</p>
        </div>
        {canAccess(["CAE","Audit Manager","Senior Auditor","Staff Auditor"])&&<Btn onClick={()=>setShowModal(true)}>+ Upload Document</Btn>}
      </div>

      {/* Category stats */}
      <div className="grid grid-cols-3 lg:grid-cols-6 gap-3 mb-5">
        {cats.map(c=>{
          const cnt=docs.filter(d=>d.category===c).length;
          return (
            <div key={c} onClick={()=>setFilterCat(c===filterCat?"All":c)} className={"kpi-card cursor-pointer transition-all hover:shadow-md "+(filterCat===c?"ring-2 ring-blue-500":"")}>
              <div className="text-2xl mb-1" dangerouslySetInnerHTML={{__html:fileIcons[c]||"&#128196;"}}/>
              <div className="text-xl font-bold text-gray-900">{cnt}</div>
              <div className="text-xs text-gray-500 mt-0.5">{c}</div>
            </div>
          );
        })}
      </div>

      <div className="flex gap-3 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search documents..." className="input-field" style={{maxWidth:280}}/>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="select-field" style={{maxWidth:180}}>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.map(d=>(
          <Card key={d.id} className="hover:shadow-md transition-shadow">
            <div className="flex items-start gap-3 mb-3">
              <div className="text-3xl" dangerouslySetInnerHTML={{__html:fileIcons[d.category]||"&#128196;"}}/>
              <div className="flex-1 min-w-0">
                <h4 className="font-semibold text-gray-900 text-sm leading-tight truncate">{d.name}</h4>
                <p className="text-xs text-gray-400 mt-0.5">{d.size} &bull; {d.version}</p>
              </div>
              <span className={"badge "+(catColors[d.category]||"bg-gray-100 text-gray-600")}>{d.category}</span>
            </div>
            <p className="text-xs text-gray-500 mb-3 leading-relaxed">{d.description}</p>
            <div className="flex items-center justify-between text-xs text-gray-400 border-t pt-3">
              <div>
                <span className="font-medium text-gray-600">{getUser(d.uploadedBy)}</span>
                <span> &bull; {d.uploadedDate}</span>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setShowHistory(d)} className="text-blue-500 hover:text-blue-700 font-medium">History</button>
                {canAccess(["CAE","Audit Manager"])&&<button onClick={()=>deleteDoc(d)} className="text-red-400 hover:text-red-600 font-medium">Delete</button>}
              </div>
            </div>
          </Card>
        ))}
        {filtered.length===0&&(
          <div className="col-span-3 text-center py-16 text-gray-400">
            <div className="text-5xl mb-3">&#128193;</div>
            <p className="font-medium">No documents found</p>
            <p className="text-sm mt-1">Upload documents to get started</p>
          </div>
        )}
      </div>

      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Upload Document">
        <Inp label="Document Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} required/>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Category" value={form.category} onChange={v=>setForm(p=>({...p,category:v}))} options={cats}/>
          <Inp label="Version" value={form.version} onChange={v=>setForm(p=>({...p,version:v}))} placeholder="e.g. v1.0"/>
        </div>
        <Inp label="File Size (optional)" value={form.size} onChange={v=>setForm(p=>({...p,size:v}))} placeholder="e.g. 1.2 MB"/>
        <Txta label="Description" value={form.description} onChange={v=>setForm(p=>({...p,description:v}))} rows={3} placeholder="Brief description of this document..."/>
        <div className="flex items-center gap-2 p-3 bg-blue-50 rounded-lg mb-4 text-xs text-blue-700">
          <span>&#128139;</span> In a production environment, this would provide a file picker to upload the actual file. For this demo, the document entry is saved to the repository.
        </div>
        <div className="flex justify-end gap-3">
          <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
          <Btn onClick={save}>Save Document</Btn>
        </div>
      </Modal>

      <Modal open={!!showHistory} onClose={()=>setShowHistory(null)} title={"Version History: "+(showHistory?.name||"")}>
        {showHistory&&(
          <div>
            <div className="space-y-2">
              {(showHistory.history||[{version:showHistory.version,date:showHistory.uploadedDate,by:getUser(showHistory.uploadedBy),note:"Current version"}]).map((h,i)=>(
                <div key={i} className="flex gap-3 p-3 bg-gray-50 rounded-lg">
                  <div className="w-16 flex-shrink-0">
                    <span className="badge bg-blue-50 text-blue-700">{h.version}</span>
                  </div>
                  <div>
                    <p className="text-sm font-medium text-gray-800">{h.note||"Updated"}</p>
                    <p className="text-xs text-gray-400">{h.by} &bull; {h.date}</p>
                  </div>
                </div>
              ))}
            </div>
            <div className="flex justify-end mt-4">
              <Btn variant="secondary" onClick={()=>setShowHistory(null)}>Close</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ============================================================
// MAIN APP ROUTER
// ============================================================
function AppContent(){
  const {currentUser,page,selectedEngagement} = useApp();

  if(!currentUser) return <LoginPage/>;

  function PageContent(){
    switch(page){
      case "dashboard": return <Dashboard/>;
      case "universe": return <AuditUniverse/>;
      case "plan": return <AnnualPlan/>;
      case "engagements": return <EngagementsList/>;
      case "engagement_detail": return selectedEngagement?<EngagementDetail/>:<EngagementsList/>;
      case "followup": return <FollowUpTracking/>;
      case "qaip": return <QAIPPage/>;
      case "users": return <UserManagement/>;
      case "docs": return <DocumentManagement/>;
      default: return <Dashboard/>;
    }
  }

  return (
    <Layout>
      <PageContent/>
    </Layout>
  );
}

function App(){
  return (
    <AppProvider>
      <AppContent/>
    </AppProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
