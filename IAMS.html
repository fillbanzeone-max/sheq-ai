function SeverityBadge({severity}){
  const map={Critical:"severity-critical",High:"severity-high",Medium:"severity-medium",Low:"severity-low",Informational:"severity-info"};
  return <span className={"badge "+(map[severity]||"bg-gray-100 text-gray-700")}>{severity}</span>;
}
function StatusBadge({status}){
  const map={Planned:"status-planned","In Progress":"status-inprogress",Completed:"status-completed",Overdue:"status-overdue",Draft:"status-draft",Approved:"status-approved",Open:"status-open",Closed:"status-closed","In Review":"status-inreview",Active:"status-completed",Inactive:"status-overdue","Not Started":"status-draft"};
  return <span className={"badge "+(map[status]||"bg-gray-100 text-gray-700")}>{status}</span>;
}
function Avatar({initials,size="sm",color="bg-blue-500"}){

  return <div className={"rounded-full "+color+" text-white flex items-center justify-center font-semibold flex-shrink-0 "+s}>{initials}</div>;
}
function Card({children,className="",padding="p-5"}){

function Inp({label,value,onChange,type="text",placeholder="",required=false}){
  return (
    <div className="mb-4">

    </div>
  );
}

      {label&&<label className="block text-sm font-medium text-gray-700 mb-1">{label}{required&&<span className="text-red-500 ml-1">*</span>}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)} className="select-field">
        {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
      </select>
    </div>
  );
}
function Txta({label,value,onChange,rows=3,placeholder=""}){
  return (
    <div className="mb-4">
      {label&&<label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} className="input-field" style={{resize:"vertical"}}/>
    </div>
  );
}
function Btn({children,onClick,variant="primary",size="md",type="button",disabled=false,className=""}){
  const variants={primary:"btn-primary",secondary:"btn-secondary",danger:"btn-danger",success:"btn-success"};
  const sizes={sm:"!px-3 !py-1.5 !text-xs",md:"",lg:"!px-6 !py-3 !text-base"};
  return <button type={type} onClick={onClick} disabled={disabled} className={(variants[variant]||"btn-primary")+" "+(sizes[size]||"")+" "+className+" disabled:opacity-50 disabled:cursor-not-allowed"}>{children}</button>;
}
function Modal({open,onClose,title,children,width="max-w-xl"}){
  if(!open)return null;
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className={"modal-box "+width} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between p-5 border-b border-gray-100">
          <h2 className="text-lg font-semibold text-gray-900">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl font-light leading-none">&#10005;</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}
function ConfirmDialog({open,onConfirm,onCancel,title,message}){
  if(!open)return null;
  return (
    <div className="modal-overlay">
      <div className="modal-box max-w-sm">
        <div className="p-6 text-center">
          <div className="text-4xl mb-3">&#9888;&#65039;</div>
          <h3 className="text-lg font-semibold mb-2">{title}</h3>
          <p className="text-gray-600 text-sm mb-6">{message}</p>
          <div className="flex gap-3 justify-center">
            <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
            <Btn variant="danger" onClick={onConfirm}>Confirm</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}
function ProgressRing({percent,size=60,stroke=5,color="#3b82f6"}){
  const r=(size-stroke*2)/2;
  const circ=2*Math.PI*r;
  const offset=circ-((percent/100)*circ);
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset 0.5s"}}/>
      <text x={size/2} y={size/2+5} textAnchor="middle" fontSize="13" fontWeight="600" fill="#1e293b">{percent}%</text>
    </svg>
  );
}

const AppContext = createContext(null);

function useApp(){ return useContext(AppContext); }

function genId(prefix="id"){ return prefix+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,7); }

function AppProvider({children}){
  const [currentUser,setCurrentUser] = useState(null);
  const [page,setPage] = useState("dashboard");
  const [selectedEngagement,setSelectedEngagement] = useState(null);
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [notifications,setNotifications] = useState([
    {id:"n1",text:"Finding F3 is overdue",type:"warning",read:false},
    {id:"n2",text:"IT General Controls engagement in progress",type:"info",read:false},
    {id:"n3",text:"Q2 plan review due this month",type:"info",read:true}
  ]);

  function loadData(key,seed){
    try{
      const s=localStorage.getItem("iams_"+key);
      return s?JSON.parse(s):seed;
    }catch(e){ return seed; }
  }
  function saveData(key,val){
    try{ localStorage.setItem("iams_"+key,JSON.stringify(val)); }catch(e){}
  }

  const [users,setUsers] = useState(()=>loadData("users",SEED_USERS));
  const [universe,setUniverse] = useState(()=>loadData("universe",SEED_UNIVERSE));
  const [plan,setPlan] = useState(()=>loadData("plan",SEED_PLAN));
  const [planApproved,setPlanApproved] = useState(()=>loadData("planApproved",false));
  const [engagements,setEngagements] = useState(()=>loadData("engagements",SEED_ENGAGEMENTS));
  const [followups,setFollowups] = useState(()=>loadData("followups",SEED_FOLLOWUPS));
  const [qaip,setQaip] = useState(()=>loadData("qaip",SEED_QAIP));
  const [docs,setDocs] = useState(()=>loadData("docs",SEED_DOCS));
  const [auditLog,setAuditLog] = useState(()=>loadData("auditLog",SEED_AUDIT_LOG));

  useEffect(()=>saveData("users",users),[users]);
  useEffect(()=>saveData("universe",universe),[universe]);
  useEffect(()=>saveData("plan",plan),[plan]);
  useEffect(()=>saveData("planApproved",planApproved),[planApproved]);
  useEffect(()=>saveData("engagements",engagements),[engagements]);
  useEffect(()=>saveData("followups",followups),[followups]);
  useEffect(()=>saveData("qaip",qaip),[qaip]);
  useEffect(()=>saveData("docs",docs),[docs]);
  useEffect(()=>saveData("auditLog",auditLog),[auditLog]);

  function logAction(action,detail){
    const entry={id:genId("al"),action,detail,user:currentUser?currentUser.name:"System",timestamp:new Date().toISOString()};
    setAuditLog(prev=>[entry,...prev].slice(0,100));
  }

  function login(email,password){
    const u=users.find(x=>x.email===email&&x.password===password&&x.active);
    if(u){ setCurrentUser(u); return true; }
    return false;
  }
  function logout(){ setCurrentUser(null); setPage("dashboard"); }

  function canAccess(roles){ if(!currentUser)return false; return roles.includes(currentUser.role)||roles.includes("*"); }

  const value={
    currentUser,login,logout,canAccess,
    page,setPage,selectedEngagement,setSelectedEngagement,
    sidebarOpen,setSidebarOpen,notifications,setNotifications,
    users,setUsers,
    universe,setUniverse,
    plan,setPlan,planApproved,setPlanApproved,
    engagements,setEngagements,
    followups,setFollowups,
    qaip,setQaip,
    docs,setDocs,
    auditLog,logAction,
    genId
  };
  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

  const doughnutChart=useRef(null);

  // Compute stats
  const allFindings=engagements.flatMap(e=>e.findings||[]);
  const openFindings=allFindings.filter(f=>f.status!=="Closed"&&f.status!=="Resolved").length;
  const today=new Date();
  const overdueActions=followups.filter(f=>f.status!=="Closed"&&new Date(f.dueDate)<today).length;
  const completedPlan=plan.filter(p=>p.status==="Completed").length;
  const planPct=plan.length?Math.round((completedPlan/plan.length)*100):0;
  const totalEngagements=engagements.length;

  // Findings by severity
  const sevCounts={Critical:0,High:0,Medium:0,Low:0,Informational:0};

function AuditUniverse(){
  const {universe,setUniverse,canAccess,logAction,genId} = useApp();
  const [search,setSearch] = useState("");
  const [filterCat,setFilterCat] = useState("All");
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [sortBy,setSortBy] = useState("residualRisk");
  const [showRank,setShowRank] = useState(false);

  const cats=["All",...[...new Set(universe.map(u=>u.category))]];

  const [form,setForm] = useState({name:"",category:"Finance",owner:"",likelihood:3,impact:3,frequency:"Annual",notes:""});

  const filtered=universe
    .filter(u=>(filterCat==="All"||u.category===filterCat)&&(u.name.toLowerCase().includes(search.toLowerCase())||u.owner.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b)=>sortBy==="residualRisk"?b.residualRisk-a.residualRisk:a.name.localeCompare(b.name));

  function openNew(){ setForm({name:"",category:"Finance",owner:"",likelihood:3,impact:3,frequency:"Annual",notes:""}); setEditing(null); setShowModal(true); }
  function openEdit(u){ setForm({name:u.name,category:u.category,owner:u.owner,likelihood:u.likelihood,impact:u.impact,frequency:u.frequency,notes:u.notes}); setEditing(u); setShowModal(true); }
  function save(){
    if(!form.name.trim())return;
    const risk=form.likelihood*form.impact;
    if(editing){
      setUniverse(prev=>prev.map(u=>u.id===editing.id?{...u,...form,residualRisk:risk}:u));
      logAction("Universe Updated","Updated auditable unit: "+form.name);
    }else{
      const n={id:genId("au"),...form,residualRisk:risk,lastAudit:"N/A"};
      setUniverse(prev=>[...prev,n]);
      logAction("Universe Added","Added auditable unit: "+form.name);
    }
    setShowModal(false);
  }
  function remove(u){
    setUniverse(prev=>prev.filter(x=>x.id!==u.id));
    logAction("Universe Removed","Removed: "+u.name);
  }
  function runRiskAssessment(){
    setUniverse(prev=>[...prev].sort((a,b)=>b.residualRisk-a.residualRisk));
    setSortBy("residualRisk");
    setShowRank(true);
    logAction("Risk Assessment Run","Annual risk assessment completed - universe re-ranked by residual risk");
    setTimeout(()=>setShowRank(false),3000);
  }

  function riskColor(r){ if(r>=16)return "text-red-600 font-bold"; if(r>=9)return "text-orange-500 font-semibold"; if(r>=4)return "text-yellow-600"; return "text-green-600"; }
  function riskLabel(r){ if(r>=16)return "Critical"; if(r>=9)return "High"; if(r>=4)return "Medium"; return "Low"; }
  function riskBg(r){ if(r>=16)return "#ef4444"; if(r>=9)return "#f97316"; if(r>=4)return "#eab308"; return "#22c55e"; }

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Audit Universe</h1>
          <p className="text-gray-500 text-sm mt-1">{universe.length} auditable units &bull; Risk-based prioritization</p>
        </div>
        <div className="flex gap-2">
          {canAccess(["CAE","Audit Manager"])&&<Btn variant="secondary" onClick={runRiskAssessment}>&#9654; Run Risk Assessment</Btn>}
          {canAccess(["CAE","Audit Manager"])&&<Btn onClick={openNew}>+ Add Unit</Btn>}
        </div>
      </div>

      {showRank&&<div className="bg-green-50 border border-green-200 text-green-700 text-sm p-3 rounded-lg mb-4">&#10004; Risk assessment complete! Units re-ranked by residual risk score.</div>}

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Main table */}
        <div className="lg:col-span-2">
          <Card padding="p-0">
            <div className="flex gap-3 p-4 border-b border-gray-100">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search units..." className="input-field" style={{maxWidth:240}}/>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="select-field" style={{maxWidth:140}}>
                {cats.map(c=><option key={c}>{c}</option>)}
              </select>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="select-field" style={{maxWidth:160}}>
                <option value="residualRisk">Sort: Risk Score</option>
                <option value="name">Sort: Name</option>
              </select>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead><tr className="table-header">
                  <th className="px-4 py-3 text-left">Auditable Unit</th>
                  <th className="px-4 py-3 text-left">Category</th>
                  <th className="px-4 py-3 text-center">L</th>
                  <th className="px-4 py-3 text-center">I</th>
                  <th className="px-4 py-3 text-center">Risk Score</th>
                  <th className="px-4 py-3 text-left">Last Audit</th>
                  <th className="px-4 py-3 text-left">Freq</th>
                  {canAccess(["CAE","Audit Manager"])&&<th className="px-4 py-3 text-center">Actions</th>}
                </tr></thead>
                <tbody>
                  {filtered.map(u=>(
                    <tr key={u.id} className="table-row">
                      <td className="px-4 py-3">
                        <div className="font-medium text-gray-800 text-sm">{u.name}</div>
                        <div className="text-xs text-gray-400">{u.owner}</div>
                      </td>
                      <td className="px-4 py-3"><span className="badge bg-blue-50 text-blue-700">{u.category}</span></td>
                      <td className="px-4 py-3 text-center">
                        <div className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold mx-auto">{u.likelihood}</div>
                      </td>
                      <td className="px-4 py-3 text-center">
                        <div className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold mx-auto">{u.impact}</div>
                      </td>
                      <td className="px-4 py-3 text-center">
                        <span className={"badge font-semibold "+(u.residualRisk>=16?"severity-critical":u.residualRisk>=9?"severity-high":u.residualRisk>=4?"severity-medium":"severity-low")}>
                          {u.residualRisk} - {riskLabel(u.residualRisk)}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-sm text-gray-600">{u.lastAudit}</td>
                      <td className="px-4 py-3 text-sm text-gray-600">{u.frequency}</td>
                      {canAccess(["CAE","Audit Manager"])&&<td className="px-4 py-3 text-center">
                        <div className="flex gap-2 justify-center">
                          <button onClick={()=>openEdit(u)} className="text-blue-500 hover:text-blue-700 text-xs font-medium">Edit</button>
                          <button onClick={()=>remove(u)} className="text-red-400 hover:text-red-600 text-xs font-medium">Del</button>
                        </div>
                      </td>}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>

        {/* Risk Matrix */}
        <div className="space-y-4">
          <Card>
            <h3 className="font-semibold text-gray-900 mb-3 text-sm">Risk Scoring Matrix</h3>
            <p className="text-xs text-gray-500 mb-3">Residual Risk = Likelihood &#215; Impact</p>
            <div style={{display:"grid",gridTemplateColumns:"auto repeat(5,1fr)",gap:"3px"}}>
              <div className="text-xs text-gray-400 flex items-end justify-center pb-1">L\I</div>
              {[1,2,3,4,5].map(i=><div key={i} className="text-center text-xs text-gray-500 font-medium pb-1">{i}</div>)}
              {[5,4,3,2,1].map(l=>(
                <React.Fragment key={l}>
                  <div className="text-xs text-gray-500 font-medium flex items-center justify-center pr-1">{l}</div>
                  {[1,2,3,4,5].map(i=>{
                    const score=l*i;
                    return (
                      <div key={i} style={{background:riskBg(score),height:"28px",borderRadius:"4px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span className="text-white text-xs font-bold">{score}</span>
                      </div>
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
            <div className="flex gap-3 mt-3 flex-wrap">
              {[["#22c55e","Low (1-3)"],["#eab308","Med (4-8)"],["#f97316","High (9-15)"],["#ef4444","Crit (16+)"]].map(([c,l])=>(
                <div key={l} className="flex items-center gap-1"><div style={{width:10,height:10,borderRadius:2,background:c}}/><span className="text-xs text-gray-500">{l}</span></div>
              ))}
            </div>
          </Card>
          <Card>
            <h3 className="font-semibold text-gray-900 mb-3 text-sm">Risk Distribution</h3>
            {[["Critical",">=16","severity-critical"],["High","9-15","severity-high"],["Medium","4-8","severity-medium"],["Low","1-3","severity-low"]].map(([label,range,cls])=>{
              const cnt=universe.filter(u=>label==="Critical"?u.residualRisk>=16:label==="High"?u.residualRisk>=9&&u.residualRisk<16:label==="Medium"?u.residualRisk>=4&&u.residualRisk<9:u.residualRisk<4).length;
              return (
                <div key={label} className="flex items-center justify-between py-2 border-b last:border-0">
                  <span className={"badge "+cls}>{label}</span>
                  <div className="flex items-center gap-2">
                    <div className="bg-gray-100 rounded-full h-2" style={{width:"80px"}}>
                      <div className="h-2 rounded-full bg-blue-500" style={{width:(cnt/universe.length*100)+"%"}}/>
                    </div>
                    <span className="text-sm font-semibold text-gray-700">{cnt}</span>
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      </div>

      <Modal open={showModal} onClose={()=>setShowModal(false)} title={editing?"Edit Auditable Unit":"Add Auditable Unit"}>
        <Inp label="Unit Name" value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} required/>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Category" value={form.category} onChange={v=>setForm(p=>({...p,category:v}))} options={["Finance","IT","HR","Operations","Compliance","Legal"]}/>
          <Sel label="Frequency" value={form.frequency} onChange={v=>setForm(p=>({...p,frequency:v}))} options={["Annual","Biennial","Triennial","As Needed"]}/>
        </div>
        <Inp label="Process Owner" value={form.owner} onChange={v=>setForm(p=>({...p,owner:v}))}/>
        <div className="grid grid-cols-2 gap-3">
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">Likelihood (1-5)</label>
            <input type="range" min="1" max="5" value={form.likelihood} onChange={e=>setForm(p=>({...p,likelihood:parseInt(e.target.value)}))} className="w-full"/>
            <div className="flex justify-between text-xs text-gray-400 mt-1"><span>Rare(1)</span><span className="font-semibold text-blue-600">{form.likelihood}</span><span>Almost Certain(5)</span></div>
          </div>
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">Impact (1-5)</label>
            <input type="range" min="1" max="5" value={form.impact} onChange={e=>setForm(p=>({...p,impact:parseInt(e.target.value)}))} className="w-full"/>
            <div className="flex justify-between text-xs text-gray-400 mt-1"><span>Minimal(1)</span><span className="font-semibold text-blue-600">{form.impact}</span><span>Catastrophic(5)</span></div>
          </div>
        </div>
        <div className="p-3 bg-gray-50 rounded-lg mb-4">
          <span className="text-sm font-medium text-gray-700">Residual Risk Score: </span>
          <span className={"text-lg font-bold "+(form.likelihood*form.impact>=16?"text-red-600":form.likelihood*form.impact>=9?"text-orange-500":form.likelihood*form.impact>=4?"text-yellow-600":"text-green-600")}>{form.likelihood*form.impact} - {riskLabel(form.likelihood*form.impact)}</span>
        </div>
        <Txta label="Notes" value={form.notes} onChange={v=>setForm(p=>({...p,notes:v}))} rows={2}/>
        <div className="flex justify-end gap-3 mt-2">
          <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
          <Btn onClick={save}>Save</Btn>
        </div>
      </Modal>
    </div>
  );
}

function AnnualPlan(){
  const {plan,setPlan,planApproved,setPlanApproved,users,canAccess,logAction,genId,universe} = useApp();
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({auditableUnit:"",quarter:"Q1",status:"Planned",budget:80,actual:0,team:[],type:"Assurance",year:2024});
  const [teamInput,setTeamInput] = useState("");

  const quarters=["Q1","Q2","Q3","Q4"];
  const auditStaff=users.filter(u=>["CAE","Audit Manager","Senior Auditor","Staff Auditor"].includes(u.role));

  function totalBudget(q){ return plan.filter(p=>p.quarter===q).reduce((s,p)=>s+Number(p.budget),0); }
  function totalActual(q){ return plan.filter(p=>p.quarter===q).reduce((s,p)=>s+Number(p.actual),0); }

  const overallBudget=plan.reduce((s,p)=>s+Number(p.budget),0);
  const overallActual=plan.reduce((s,p)=>s+Number(p.actual),0);
  const completedCount=plan.filter(p=>p.status==="Completed").length;
  const planPct=plan.length?Math.round((completedCount/plan.length)*100):0;

  function openNew(){ setForm({auditableUnit:"",quarter:"Q1",status:"Planned",budget:80,actual:0,team:[],type:"Assurance",year:2024}); setEditing(null); setShowModal(true); }
  function openEdit(p){ setForm({...p}); setEditing(p); setShowModal(true); }
  function save(){
    if(!form.auditableUnit)return;
    if(editing){
      setPlan(prev=>prev.map(p=>p.id===editing.id?{...p,...form}:p));
      logAction("Plan Updated","Updated plan item: "+form.auditableUnit);
    }else{
      setPlan(prev=>[...prev,{id:genId("p"),...form}]);
      logAction("Plan Item Added","Added to plan: "+form.auditableUnit);
    }
    setShowModal(false);
  }
  function remove(p){
    setPlan(prev=>prev.filter(x=>x.id!==p.id));
    logAction("Plan Item Removed","Removed from plan: "+p.auditableUnit);
  }
  function approvePlan(){
    setPlanApproved(true);
    logAction("Plan Approved","2024 Annual Audit Plan approved by CAE");
  }
  function toggleTeam(uid){
    setForm(p=>({...p,team:p.team.includes(uid)?p.team.filter(x=>x!==uid):[...p.team,uid]}));
  }

  function getUserName(id){ return users.find(u=>u.id===id)?.name||id; }
  function getUserInitials(id){ return users.find(u=>u.id===id)?.avatar||"?"; }

  const avatarColors=["bg-blue-500","bg-indigo-500","bg-purple-500","bg-teal-500","bg-orange-500","bg-pink-500"];

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Annual Audit Plan 2024</h1>

        </div>
        <div className="flex gap-2">
          {canAccess(["CAE"])&&!planApproved&&<Btn variant="success" onClick={approvePlan}>&#10003; Approve Plan</Btn>}
          {canAccess(["CAE","Audit Manager"])&&<Btn onClick={openNew}>+ Add Engagement</Btn>}
        </div>

        <span className="text-xl">{planApproved?"✅":"⏳"}</span>
        <div>
          <p className={"font-semibold text-sm "+(planApproved?"text-green-800":"text-amber-800")}>
            {planApproved?"Plan Approved — 2024 Annual Audit Plan has been approved by the CAE":"Pending Approval — 2024 Annual Audit Plan awaiting CAE approval"}
          </p>
          <p className={"text-xs "+(planApproved?"text-green-600":"text-amber-600")}>
            {planApproved?`${completedCount} of ${plan.length} engagements completed (${planPct}%)`:"Plan must be reviewed and approved before execution begins"}
          </p>
        </div>
        <div className="ml-auto">

function EngagementsList(){
  const {engagements,setPage,setSelectedEngagement,canAccess,currentUser} = useApp();
  const [filterStatus,setFilterStatus] = useState("All");
  const [filterType,setFilterType] = useState("All");
  const [search,setSearch] = useState("");

  const statuses=["All","Planned","In Progress","Completed"];
  const types=["All","Assurance","Advisory","Investigation","Compliance"];

  let list=engagements;
  if(currentUser?.role==="Auditee") list=list.filter(e=>e.auditee===currentUser.id||e.team?.includes(currentUser.id));
  list=list
    .filter(e=>filterStatus==="All"||e.status===filterStatus)
    .filter(e=>filterType==="All"||e.type===filterType)
    .filter(e=>e.title.toLowerCase().includes(search.toLowerCase())||e.auditableUnit.toLowerCase().includes(search.toLowerCase()));

  function open(e){ setSelectedEngagement(e); setPage("engagement_detail"); }

  const statusColors={Planned:"bg-indigo-50 border-indigo-200","In Progress":"bg-blue-50 border-blue-200",Completed:"bg-green-50 border-green-200",Overdue:"bg-red-50 border-red-200"};

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Engagements</h1>
          <p className="text-gray-500 text-sm mt-1">{list.length} engagements</p>
        </div>
      </div>
      <div className="flex gap-3 mb-5">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search engagements..." className="input-field" style={{maxWidth:260}}/>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="select-field" style={{maxWidth:160}}>
          {statuses.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="select-field" style={{maxWidth:160}}>
          {types.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {list.map(e=>(
          <div key={e.id} onClick={()=>open(e)} className={"card p-5 cursor-pointer hover:shadow-md transition-shadow border "+(statusColors[e.status]||"bg-white border-gray-200")}>
            <div className="flex items-start justify-between mb-3">
              <div className="flex-1 min-w-0">
                <h3 className="font-semibold text-gray-900 text-sm leading-tight mb-1">{e.title}</h3>
                <p className="text-xs text-gray-500">{e.auditableUnit}</p>
              </div>
              <StatusBadge status={e.status}/>
            </div>
            <div className="flex items-center gap-2 mb-3">
              <span className="badge bg-indigo-50 text-indigo-700">{e.type}</span>
              <span className="badge bg-gray-100 text-gray-600">{e.quarter}</span>
            </div>
            <div className="grid grid-cols-2 gap-2 text-xs text-gray-500 mb-3">
              <div><span className="font-medium">Start:</span> {e.plannedStart}</div>
              <div><span className="font-medium">End:</span> {e.plannedEnd}</div>
            </div>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-1">
                <span className="text-xs text-gray-400 mr-1">Findings:</span>
                <span className="badge severity-high">{(e.findings||[]).filter(f=>f.severity==="High"||f.severity==="Critical").length} High</span>
                <span className="badge severity-medium">{(e.findings||[]).filter(f=>f.severity==="Medium").length} Med</span>
              </div>
              <span className="text-xs text-blue-500 font-medium">View Details &rarr;</span>
            </div>
          </div>
        ))}
        {list.length===0&&(
          <div className="col-span-3 text-center py-16 text-gray-400">
            <div className="text-4xl mb-3">&#128196;</div>
            <p className="font-medium">No engagements found</p>
            <p className="text-sm mt-1">Adjust your filters or add a new engagement</p>
          </div>
        )}
      </div>
    </div>
  );
}

function EngagementDetail(){
  const {selectedEngagement,setSelectedEngagement,engagements,setEngagements,users,currentUser,canAccess,logAction,genId,setPage} = useApp();
  const [tab,setTab] = useState("planning");
  const [eng,setEng] = useState(null);

  useEffect(()=>{
    if(selectedEngagement){
      const fresh=engagements.find(e=>e.id===selectedEngagement.id)||selectedEngagement;
      setEng({...fresh});
    }
  },[selectedEngagement,engagements]);

  function saveEng(updated){
    setEngagements(prev=>prev.map(e=>e.id===updated.id?updated:e));
    setSelectedEngagement(updated);
    setEng(updated);
  }

  if(!eng) return <div className="text-gray-500 p-8">Loading engagement...</div>;

  const tabs=[
    {id:"planning",label:"Planning"},
    {id:"rcm",label:"RCM"},
    {id:"program",label:"Audit Program"},
    {id:"fieldwork",label:"Fieldwork"},
    {id:"findings",label:"Findings ("+(eng.findings||[]).length+")"},
    {id:"report",label:"Report"}
  ];

  // Only auditors/CAE and the assigned auditee can view
  const canEdit=canAccess(["CAE","Audit Manager","Senior Auditor","Staff Auditor"]);

  return (
    <div>
      <div className="flex items-center gap-3 mb-4">
        <button onClick={()=>{setPage("engagements");setSelectedEngagement(null);}} className="btn-secondary text-sm">&#8592; Back</button>
        <div className="flex-1">
          <h1 className="text-xl font-bold text-gray-900">{eng.title}</h1>
          <div className="flex items-center gap-2 mt-1">
            <StatusBadge status={eng.status}/>
            <span className="badge bg-indigo-50 text-indigo-700">{eng.type}</span>
            <span className="text-gray-400 text-sm">{eng.quarter}</span>
          </div>
        </div>
        {canEdit&&(
          <select value={eng.status} onChange={e=>{const u={...eng,status:e.target.value};saveEng(u);logAction("Engagement Status Changed",eng.title+" status changed to "+e.target.value);}} className="select-field" style={{maxWidth:160}}>
            {["Planned","In Progress","Completed","On Hold"].map(s=><option key={s}>{s}</option>)}
          </select>
        )}
      </div>

      {/* Tabs */}
      <div className="border-b border-gray-200 mb-5">
        <div className="flex gap-0 overflow-x-auto">
          {tabs.map(t=><button key={t.id} className={"tab-btn "+(tab===t.id?"active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </div>

      {tab==="planning"&&<PlanningTab eng={eng} saveEng={saveEng} users={users} canEdit={canEdit} logAction={logAction}/>}
      {tab==="rcm"&&<RCMTab eng={eng} saveEng={saveEng} canEdit={canEdit} genId={genId} logAction={logAction}/>}
      {tab==="program"&&<ProgramTab eng={eng} saveEng={saveEng} users={users} canEdit={canEdit} genId={genId} logAction={logAction}/>}
      {tab==="fieldwork"&&<FieldworkTab eng={eng} saveEng={saveEng} canEdit={canEdit} logAction={logAction}/>}
      {tab==="findings"&&<FindingsTab eng={eng} saveEng={saveEng} users={users} canEdit={canEdit} currentUser={currentUser} genId={genId} logAction={logAction}/>}
      {tab==="report"&&<ReportTab eng={eng} users={users}/>}
    </div>
  );
}

  function save(){

            <Inp label="Actual Start" value={form.actualStart} onChange={v=>setForm(p=>({...p,actualStart:v}))} type="date"/>
            <Inp label="Actual End" value={form.actualEnd} onChange={v=>setForm(p=>({...p,actualEnd:v}))} type="date"/>

        <Card>
          <h3 className="font-semibold text-gray-900 mb-3">Audit Team</h3>

              <label key={u.id} className="flex items-center gap-2 cursor-pointer p-1.5 rounded hover:bg-gray-50">
                <input type="checkbox" checked={teamIds.includes(u.id)} onChange={()=>canEdit&&toggleTeam(u.id)} disabled={!canEdit}/>
                <Avatar initials={u.avatar} size="sm" color={avatarColors[i%avatarColors.length]}/>

                <span className="text-xs text-gray-400">({u.role})</span>
              </label>
            ))}
          </div>
          <h3 className="font-semibold text-gray-900 mb-2 text-sm">Auditee</h3>
          <Sel label="" value={form.auditee} onChange={v=>setForm(p=>({...p,auditee:v}))} options={[{value:"",label:"Select auditee..."},...auditees.map(u=>({value:u.id,label:u.name+" ("+u.department+")"}))]}/>
        </Card>
      </div>
    </div>
  );
}

function RCMTab({eng,saveEng,canEdit,genId,logAction}){
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({process:"",risk:"",control:"",controlType:"Preventive",effectiveness:"Effective",testResult:"Not Tested"});

  function openNew(){ setForm({process:"",risk:"",control:"",controlType:"Preventive",effectiveness:"Effective",testResult:"Not Tested"}); setEditing(null); setShowModal(true); }
  function openEdit(r){ setForm({process:r.process,risk:r.risk,control:r.control,controlType:r.controlType,effectiveness:r.effectiveness,testResult:r.testResult}); setEditing(r); setShowModal(true); }
  function save(){
    if(!form.process||!form.risk)return;
    let rcm=[...(eng.rcm||[])];
    if(editing){ rcm=rcm.map(r=>r.id===editing.id?{...r,...form}:r); }
    else{ rcm.push({id:genId("r"),...form}); }
    saveEng({...eng,rcm});
    logAction("RCM Updated","Updated RCM for: "+eng.title);
    setShowModal(false);
  }
  function remove(id){ saveEng({...eng,rcm:(eng.rcm||[]).filter(r=>r.id!==id)}); }

  const effectColors={Effective:"status-completed","Partially Effective":"status-inreview","Not Effective":"status-overdue","Not Tested":"status-draft"};
  const testColors={Pass:"status-completed",Fail:"status-overdue","Not Tested":"status-draft"};

  return (
    <div>
      <div className="flex justify-between items-center mb-4">
        <h3 className="font-semibold text-gray-900">Risk and Control Matrix</h3>
        {canEdit&&<Btn size="sm" onClick={openNew}>+ Add Row</Btn>}
      </div>
      <Card padding="p-0">
        <table className="w-full">
          <thead><tr className="table-header">
            <th className="px-4 py-3 text-left">Process</th>
            <th className="px-4 py-3 text-left">Risk</th>
            <th className="px-4 py-3 text-left">Control</th>
            <th className="px-4 py-3 text-left">Type</th>
            <th className="px-4 py-3 text-left">Effectiveness</th>
            <th className="px-4 py-3 text-left">Test Result</th>
            {canEdit&&<th className="px-4 py-3"/>}
          </tr></thead>
          <tbody>
            {(eng.rcm||[]).map(r=>(
              <tr key={r.id} className="table-row">
                <td className="px-4 py-3 font-medium text-sm text-gray-800">{r.process}</td>
                <td className="px-4 py-3 text-sm text-gray-600 max-w-xs">{r.risk}</td>
                <td className="px-4 py-3 text-sm text-gray-600 max-w-xs">{r.control}</td>
                <td className="px-4 py-3"><span className="badge bg-blue-50 text-blue-700">{r.controlType}</span></td>
                <td className="px-4 py-3"><span className={"badge "+(effectColors[r.effectiveness]||"bg-gray-100 text-gray-600")}>{r.effectiveness}</span></td>
                <td className="px-4 py-3"><span className={"badge "+(testColors[r.testResult]||"bg-gray-100 text-gray-600")}>{r.testResult}</span></td>
                {canEdit&&<td className="px-4 py-3">
                  <div className="flex gap-2">
                    <button onClick={()=>openEdit(r)} className="text-blue-500 text-xs font-medium">Edit</button>
                    <button onClick={()=>remove(r.id)} className="text-red-400 text-xs font-medium">Del</button>
                  </div>
                </td>}
              </tr>
            ))}
            {!(eng.rcm||[]).length&&<tr><td colSpan="7" className="text-center text-gray-400 py-8 text-sm">No RCM rows. Add risks and controls.</td></tr>}
          </tbody>
        </table>
      </Card>
      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Risk and Control Entry">
        <Inp label="Process" value={form.process} onChange={v=>setForm(p=>({...p,process:v}))} required/>
        <Txta label="Risk" value={form.risk} onChange={v=>setForm(p=>({...p,risk:v}))} rows={2}/>
        <Txta label="Control Activity" value={form.control} onChange={v=>setForm(p=>({...p,control:v}))} rows={2}/>
        <div className="grid grid-cols-3 gap-3">
          <Sel label="Control Type" value={form.controlType} onChange={v=>setForm(p=>({...p,controlType:v}))} options={["Preventive","Detective","Corrective"]}/>
          <Sel label="Effectiveness" value={form.effectiveness} onChange={v=>setForm(p=>({...p,effectiveness:v}))} options={["Effective","Partially Effective","Not Effective","Not Tested"]}/>
          <Sel label="Test Result" value={form.testResult} onChange={v=>setForm(p=>({...p,testResult:v}))} options={["Pass","Fail","Not Tested"]}/>
        </div>
        <div className="flex justify-end gap-3"><Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn><Btn onClick={save}>Save</Btn></div>
      </Modal>
    </div>
  );
}

function ProgramTab({eng,saveEng,users,canEdit,genId,logAction}){
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({step:"",procedure:"",assignee:"",status:"Not Started",dueDate:"",notes:""});
  const auditStaff=users.filter(u=>["CAE","Audit Manager","Senior Auditor","Staff Auditor"].includes(u.role));

  function openNew(){ setForm({step:"",procedure:"",assignee:"",status:"Not Started",dueDate:"",notes:""}); setEditing(null); setShowModal(true); }
  function openEdit(p){ setForm({step:p.step,procedure:p.procedure,assignee:p.assignee,status:p.status,dueDate:p.dueDate,notes:p.notes}); setEditing(p); setShowModal(true); }
  function save(){
    if(!form.procedure)return;
    let prog=[...(eng.program||[])];
    if(editing){ prog=prog.map(p=>p.id===editing.id?{...p,...form}:p); }
    else{ prog.push({id:genId("pr"),...form}); }
    saveEng({...eng,program:prog});
    logAction("Program Updated","Updated audit program for: "+eng.title);
    setShowModal(false);
  }
  function remove(id){ saveEng({...eng,program:(eng.program||[]).filter(p=>p.id!==id)}); }

  const completed=(eng.program||[]).filter(p=>p.status==="Completed").length;
  const total=(eng.program||[]).length;
  const pct=total?Math.round((completed/total)*100):0;

  return (
    <div>
      <div className="flex justify-between items-center mb-4">
        <div className="flex items-center gap-4">
          <h3 className="font-semibold text-gray-900">Audit Program</h3>
          <div className="flex items-center gap-2">
            <div className="w-32 bg-gray-100 rounded-full h-2">
              <div className="h-2 rounded-full bg-green-500 transition-all" style={{width:pct+"%"}}/>
            </div>
            <span className="text-sm text-gray-600">{completed}/{total} complete ({pct}%)</span>
          </div>
        </div>
        {canEdit&&<Btn size="sm" onClick={openNew}>+ Add Step</Btn>}
      </div>
      <Card padding="p-0">
        <table className="w-full">
          <thead><tr className="table-header">
            <th className="px-4 py-3 text-left w-16">Step</th>
            <th className="px-4 py-3 text-left">Procedure</th>
            <th className="px-4 py-3 text-left">Assignee</th>
            <th className="px-4 py-3 text-left">Status</th>
            <th className="px-4 py-3 text-left">Due Date</th>
            <th className="px-4 py-3 text-left">Notes</th>
            {canEdit&&<th className="px-4 py-3"/>}
          </tr></thead>
          <tbody>
            {(eng.program||[]).map(p=>(
              <tr key={p.id} className="table-row">
                <td className="px-4 py-3 text-sm font-mono text-gray-500">{p.step}</td>
                <td className="px-4 py-3 text-sm text-gray-800">{p.procedure}</td>
                <td className="px-4 py-3 text-sm text-gray-600">{users.find(u=>u.id===p.assignee)?.name||p.assignee||"-"}</td>
                <td className="px-4 py-3"><StatusBadge status={p.status}/></td>
                <td className="px-4 py-3 text-sm text-gray-600">{p.dueDate}</td>
                <td className="px-4 py-3 text-sm text-gray-500 max-w-xs truncate">{p.notes||"-"}</td>
                {canEdit&&<td className="px-4 py-3">
                  <div className="flex gap-2">
                    <button onClick={()=>openEdit(p)} className="text-blue-500 text-xs font-medium">Edit</button>
                    <button onClick={()=>remove(p.id)} className="text-red-400 text-xs font-medium">Del</button>
                  </div>
                </td>}
              </tr>
            ))}
            {!(eng.program||[]).length&&<tr><td colSpan="7" className="text-center text-gray-400 py-8 text-sm">No audit program steps. Add procedures.</td></tr>}
          </tbody>
        </table>
      </Card>
      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Audit Program Step">
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Step Number" value={form.step} onChange={v=>setForm(p=>({...p,step:v}))} placeholder="e.g. 1.1"/>
          <Sel label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={["Not Started","In Progress","Completed","On Hold"]}/>
        </div>
        <Txta label="Procedure" value={form.procedure} onChange={v=>setForm(p=>({...p,procedure:v}))} rows={2} placeholder="Describe the audit procedure..."/>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Assignee" value={form.assignee} onChange={v=>setForm(p=>({...p,assignee:v}))} options={[{value:"",label:"Unassigned"},...auditStaff.map(u=>({value:u.id,label:u.name}))]}/>
          <Inp label="Due Date" value={form.dueDate} onChange={v=>setForm(p=>({...p,dueDate:v}))} type="date"/>

      </Modal>

  );
}

function FieldworkTab({eng,saveEng,canEdit,logAction}){
  const [fileInput,setFileInput] = useState("");
  const [signoffs,setSignoffs] = useState(eng.signoffs||{});
  const evidence=eng.evidence||[];

  function addEvidence(){
    if(!fileInput.trim())return;
    saveEng({...eng,evidence:[...evidence,fileInput.trim()]});
    logAction("Evidence Added","Added evidence file to: "+eng.title);
    setFileInput("");
  }
  function removeEvidence(f){ saveEng({...eng,evidence:evidence.filter(e=>e!==f)}); }
  function signOff(area){
    const s={...signoffs,[area]:{by:"Auditor",date:new Date().toLocaleDateString()}};
    setSignoffs(s);
    saveEng({...eng,signoffs:s});
    logAction("Signoff Recorded","Fieldwork sign-off for "+area+" in: "+eng.title);
  }

  const areas=["Planning Completed","RCM Reviewed","Testing Completed","Findings Drafted","Working Papers Filed"];

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <Card>
        <h3 className="font-semibold text-gray-900 mb-4">Evidence Repository</h3>
        {canEdit&&(
          <div className="flex gap-2 mb-4">
            <input value={fileInput} onChange={e=>setFileInput(e.target.value)} placeholder="Enter file name (e.g. GL_Extract.xlsx)" className="input-field flex-1"/>
            <Btn onClick={addEvidence}>Upload</Btn>
          </div>
        )}
        <div className="space-y-2">
          {evidence.map((f,i)=>(
            <div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
              <span className="text-2xl">&#128196;</span>
              <span className="flex-1 text-sm text-gray-700">{f}</span>
              {canEdit&&<button onClick={()=>removeEvidence(f)} className="text-red-400 hover:text-red-600 text-xs">Remove</button>}
            </div>
          ))}
          {evidence.length===0&&<p className="text-gray-400 text-sm text-center py-4">No evidence files uploaded yet.</p>}
        </div>
      </Card>
      <Card>
        <h3 className="font-semibold text-gray-900 mb-4">Working Paper Sign-Off</h3>
        <div className="space-y-3">
          {areas.map(area=>(
            <div key={area} className={"flex items-center justify-between p-3 rounded-lg "+(signoffs[area]?"bg-green-50":"bg-gray-50")}>
              <div>
                <p className="text-sm font-medium text-gray-800">{area}</p>
                {signoffs[area]&&<p className="text-xs text-green-600 mt-0.5">Signed off by {signoffs[area].by} on {signoffs[area].date}</p>}
              </div>
              {signoffs[area]
                ? <span className="badge status-completed">&#10003; Signed</span>
                : canEdit&&<Btn size="sm" variant="secondary" onClick={()=>signOff(area)}>Sign Off</Btn>
              }
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function FindingsTab({eng,saveEng,users,canEdit,currentUser,genId,logAction}){
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing] = useState(null);
  const [form,setForm] = useState({title:"",condition:"",criteria:"",cause:"",consequence:"",recommendation:"",managementResponse:"",severity:"Medium",status:"Open",owner:"",dueDate:""});

  const auditees=users.filter(u=>u.role==="Auditee");
  let findings=eng.findings||[];
  if(currentUser?.role==="Auditee") findings=findings.filter(f=>f.owner===currentUser.id);

  function openNew(){ setForm({title:"",condition:"",criteria:"",cause:"",consequence:"",recommendation:"",managementResponse:"",severity:"Medium",status:"Open",owner:"",dueDate:""}); setEditing(null); setShowModal(true); }
  function openEdit(f){ setForm({title:f.title,condition:f.condition,criteria:f.criteria,cause:f.cause,consequence:f.consequence,recommendation:f.recommendation,managementResponse:f.managementResponse||"",severity:f.severity,status:f.status,owner:f.owner,dueDate:f.dueDate}); setEditing(f); setShowModal(true); }
  function save(){
    if(!form.title.trim())return;
    let list=[...(eng.findings||[])];
    if(editing){
      list=list.map(f=>f.id===editing.id?{...f,...form}:f);
      logAction("Finding Updated","Updated finding: "+form.title);
    }else{
      list.push({id:genId("f"),...form,engagementId:eng.id});
      logAction("Finding Created","New "+form.severity+" finding: "+form.title+" in "+eng.title);
    }
    saveEng({...eng,findings:list});
    setShowModal(false);
  }
  function remove(id){ saveEng({...eng,findings:(eng.findings||[]).filter(f=>f.id!==id)}); }

  const getUserName=id=>users.find(u=>u.id===id)?.name||id;

  return (
    <div>
      <div className="flex justify-between items-center mb-4">
        <h3 className="font-semibold text-gray-900">Findings ({findings.length})</h3>
        {canEdit&&<Btn size="sm" onClick={openNew}>+ Add Finding</Btn>}
      </div>
      <div className="space-y-4">
        {findings.map(f=>(
          <Card key={f.id} className="border-l-4" style={{borderLeftColor:f.severity==="Critical"?"#ef4444":f.severity==="High"?"#f97316":f.severity==="Medium"?"#eab308":"#22c55e"}}>
            <div className="flex items-start justify-between mb-3">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-1">
                  <SeverityBadge severity={f.severity}/>
                  <StatusBadge status={f.status}/>
                </div>
                <h4 className="font-semibold text-gray-900">{f.title}</h4>
              </div>
              {canEdit&&<div className="flex gap-2 ml-3">
                <button onClick={()=>openEdit(f)} className="text-blue-500 text-xs font-medium">Edit</button>
                <button onClick={()=>remove(f.id)} className="text-red-400 text-xs font-medium">Del</button>
              </div>}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 text-sm">
              <div><p className="font-medium text-gray-700 mb-1">Condition</p><p className="text-gray-600">{f.condition}</p></div>
              <div><p className="font-medium text-gray-700 mb-1">Criteria</p><p className="text-gray-600">{f.criteria}</p></div>
              <div><p className="font-medium text-gray-700 mb-1">Cause</p><p className="text-gray-600">{f.cause}</p></div>
              <div><p className="font-medium text-gray-700 mb-1">Consequence</p><p className="text-gray-600">{f.consequence}</p></div>
              <div><p className="font-medium text-gray-700 mb-1">Recommendation</p><p className="text-gray-600">{f.recommendation}</p></div>
              <div><p className="font-medium text-gray-700 mb-1">Management Response</p><p className="text-gray-600">{f.managementResponse||"Pending"}</p></div>
            </div>
            <div className="flex gap-4 mt-3 pt-3 border-t border-gray-100 text-xs text-gray-500">
              <span>Owner: <strong>{getUserName(f.owner)}</strong></span>
              <span>Due: <strong>{f.dueDate}</strong></span>
            </div>
          </Card>
        ))}
        {findings.length===0&&<div className="text-center py-12 text-gray-400"><div className="text-4xl mb-2">&#10004;</div><p>No findings. Great work!</p></div>}
      </div>

      <Modal open={showModal} onClose={()=>setShowModal(false)} title={editing?"Edit Finding":"New Finding"} width="max-w-3xl">
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Severity" value={form.severity} onChange={v=>setForm(p=>({...p,severity:v}))} options={["Critical","High","Medium","Low","Informational"]}/>
          <Sel label="Status" value={form.status} onChange={v=>setForm(p=>({...p,status:v}))} options={["Open","In Progress","In Review","Closed"]}/>
        </div>
        <Inp label="Finding Title" value={form.title} onChange={v=>setForm(p=>({...p,title:v}))} required/>
        <Txta label="Condition (What is)" value={form.condition} onChange={v=>setForm(p=>({...p,condition:v}))} rows={2}/>
        <Txta label="Criteria (What should be)" value={form.criteria} onChange={v=>setForm(p=>({...p,criteria:v}))} rows={2}/>
        <Txta label="Cause (Why it happened)" value={form.cause} onChange={v=>setForm(p=>({...p,cause:v}))} rows={2}/>
        <Txta label="Consequence (So what)" value={form.consequence} onChange={v=>setForm(p=>({...p,consequence:v}))} rows={2}/>
        <Txta label="Recommendation" value={form.recommendation} onChange={v=>setForm(p=>({...p,recommendation:v}))} rows={2}/>
        <Txta label="Management Response" value={form.managementResponse} onChange={v=>setForm(p=>({...p,managementResponse:v}))} rows={2} placeholder="Awaiting management response..."/>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Assign To" value={form.owner} onChange={v=>setForm(p=>({...p,owner:v}))} options={[{value:"",label:"Select owner..."},...auditees.map(u=>({value:u.id,label:u.name}))]}/>
          <Inp label="Due Date" value={form.dueDate} onChange={v=>setForm(p=>({...p,dueDate:v}))} type="date"/>
        </div>
        <div className="flex justify-end gap-3"><Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn><Btn onClick={save}>Save Finding</Btn></div>
      </Modal>
    </div>
  );
}

function FollowUpTracking(){
  const {followups,setFollowups,engagements,users,canAccess,currentUser,logAction,genId} = useApp();
  const [filterSev,setFilterSev] = useState("All");
  const [filterStatus,setFilterStatus] = useState("All");
  const [filterOwner,setFilterOwner] = useState("All");
  const [filterOverdue,setFilterOverdue] = useState(false);
  const [showModal,setShowModal] = useState(false);
  const [selected,setSelected] = useState(null);
  const [updateNote,setUpdateNote] = useState("");
  const [newStatus,setNewStatus] = useState("");
  const [confirmItem,setConfirmItem] = useState(null);

  const today=new Date();
  const auditees=users.filter(u=>u.role==="Auditee");

  // Build full followup list from all engagement findings + the standalone ones
  const allFindings=engagements.flatMap(e=>(e.findings||[]).map(f=>({...f,engTitle:e.title})));

  // Merge followups with finding data
  let list=followups.map(fu=>{
    const finding=allFindings.find(f=>f.id===fu.findingId)||{};
    return {...fu,...finding,findingTitle:fu.findingTitle||finding.title,engagementTitle:fu.engagementTitle||finding.engTitle};
  });

  if(currentUser?.role==="Auditee") list=list.filter(f=>f.owner===currentUser.id);
  if(filterSev!=="All") list=list.filter(f=>f.severity===filterSev);
  if(filterStatus!=="All") list=list.filter(f=>f.status===filterStatus);
  if(filterOwner!=="All") list=list.filter(f=>f.owner===filterOwner);
  if(filterOverdue) list=list.filter(f=>f.status!=="Closed"&&new Date(f.dueDate)<today);

  const getOwnerName=id=>users.find(u=>u.id===id)?.name||id;

  function isOverdue(fu){ return fu.status!=="Closed"&&new Date(fu.dueDate)<today; }

  function openUpdate(fu){ setSelected(fu); setNewStatus(fu.status); setUpdateNote(""); setShowModal(true); }
  function saveUpdate(){
    if(!selected)return;
    const note={date:new Date().toLocaleDateString(),note:updateNote,by:currentUser?.name||"User"};
    setFollowups(prev=>prev.map(fu=>fu.id===selected.id
      ?{...fu,status:newStatus,updates:[...(fu.updates||[]),note]}
      :fu
    ));
    logAction("Finding Status Updated","Finding: "+selected.findingTitle+" changed to "+newStatus);
    setShowModal(false);
  }

  // Summary counts
  const openCount=followups.filter(f=>f.status==="Open").length;
  const inProgressCount=followups.filter(f=>f.status==="In Progress").length;
  const closedCount=followups.filter(f=>f.status==="Closed").length;
  const overdueCount=followups.filter(f=>f.status!=="Closed"&&new Date(f.dueDate)<today).length;

  const summaryCards=[
    {label:"Open",value:openCount,color:"bg-orange-50",text:"text-orange-600",border:"border-orange-200"},
    {label:"In Progress",value:inProgressCount,color:"bg-blue-50",text:"text-blue-600",border:"border-blue-200"},
    {label:"Closed",value:closedCount,color:"bg-green-50",text:"text-green-600",border:"border-green-200"},
    {label:"Overdue",value:overdueCount,color:"bg-red-50",text:"text-red-600",border:"border-red-200"}
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Follow-Up Tracking</h1>
          <p className="text-gray-500 text-sm mt-1">Monitor remediation progress for all open findings</p>
        </div>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-4 gap-3 mb-6">
        {summaryCards.map(c=>(
          <div key={c.label} className={"kpi-card border "+c.color+" "+c.border}>
            <div className={"text-3xl font-bold "+c.text}>{c.value}</div>
            <div className="text-sm text-gray-500 mt-1">{c.label}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <Card padding="p-3" className="mb-4">
        <div className="flex gap-3 flex-wrap items-center">
          <select value={filterSev} onChange={e=>setFilterSev(e.target.value)} className="select-field" style={{maxWidth:140}}>
            {["All","Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="select-field" style={{maxWidth:140}}>
            {["All","Open","In Progress","Closed"].map(s=><option key={s}>{s}</option>)}
          </select>
          <select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} className="select-field" style={{maxWidth:180}}>
            <option value="All">All Owners</option>
            {auditees.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={filterOverdue} onChange={e=>setFilterOverdue(e.target.checked)} className="rounded"/>
            <span className="text-sm text-red-600 font-medium">Show Overdue Only</span>
          </label>
          <span className="ml-auto text-sm text-gray-400">{list.length} records</span>
        </div>
      </Card>

      {/* Table */}
      <Card padding="p-0">
        <table className="w-full">
          <thead><tr className="table-header">
            <th className="px-4 py-3 text-left">Finding</th>
            <th className="px-4 py-3 text-left">Engagement</th>
            <th className="px-4 py-3 text-left">Severity</th>
            <th className="px-4 py-3 text-left">Status</th>
            <th className="px-4 py-3 text-left">Owner</th>
            <th className="px-4 py-3 text-left">Due Date</th>
            <th className="px-4 py-3 text-left">Last Update</th>
            <th className="px-4 py-3 text-center">Actions</th>
          </tr></thead>
          <tbody>
            {list.map(fu=>(
              <tr key={fu.id} className={"table-row "+(isOverdue(fu)?"bg-red-50/40":"")}>
                <td className="px-4 py-3">
                  <div className="font-medium text-sm text-gray-800 max-w-xs">{fu.findingTitle}</div>
                  {isOverdue(fu)&&<span className="badge status-overdue mt-1">Overdue</span>}
                </td>
                <td className="px-4 py-3 text-sm text-gray-500 max-w-xs truncate">{fu.engagementTitle}</td>
                <td className="px-4 py-3"><SeverityBadge severity={fu.severity}/></td>
                <td className="px-4 py-3"><StatusBadge status={fu.status}/></td>
                <td className="px-4 py-3 text-sm text-gray-700">{getOwnerName(fu.owner)}</td>
                <td className={"px-4 py-3 text-sm font-medium "+(isOverdue(fu)?"text-red-600":"text-gray-700")}>{fu.dueDate}</td>
                <td className="px-4 py-3 text-xs text-gray-400">
                  {(fu.updates||[]).length>0
                    ? <div><div className="font-medium text-gray-600">{fu.updates[fu.updates.length-1].date}</div><div className="truncate max-w-xs">{fu.updates[fu.updates.length-1].note}</div></div>
                    : "No updates"}
                </td>
                <td className="px-4 py-3 text-center">
                  <Btn size="sm" variant="secondary" onClick={()=>openUpdate(fu)}>Update</Btn>
                </td>
              </tr>
            ))}
            {list.length===0&&<tr><td colSpan="8" className="text-center text-gray-400 py-10 text-sm">No follow-up items match the current filters.</td></tr>}
          </tbody>
        </table>
      </Card>

      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Update Finding Status">
        {selected&&(
          <div>
            <div className="p-3 bg-gray-50 rounded-lg mb-4">
              <p className="font-medium text-gray-800 text-sm">{selected.findingTitle}</p>
              <p className="text-xs text-gray-500 mt-1">{selected.engagementTitle}</p>
              <div className="flex gap-2 mt-2"><SeverityBadge severity={selected.severity}/><StatusBadge status={selected.status}/></div>
            </div>
            <Sel label="New Status" value={newStatus} onChange={setNewStatus} options={["Open","In Progress","In Review","Closed"]}/>
            <Txta label="Update Note" value={updateNote} onChange={setUpdateNote} rows={3} placeholder="Describe remediation actions taken, evidence obtained..."/>
            {/* Update history */}
            {(selected.updates||[]).length>0&&(
              <div className="mt-3">
                <p className="text-xs font-medium text-gray-700 mb-2">Update History</p>
                <div className="space-y-2 max-h-40 overflow-y-auto">
                  {[...(selected.updates||[])].reverse().map((u,i)=>(
                    <div key={i} className="text-xs p-2 bg-gray-50 rounded">
                      <span className="font-medium text-gray-700">{u.date} &bull; {u.by}: </span>
                      <span className="text-gray-600">{u.note}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="flex justify-end gap-3 mt-4">
              <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
              <Btn onClick={saveUpdate}>Save Update</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// QAIP PAGE
// ============================================================
function QAIPPage(){
  const {qaip,setQaip,canAccess,logAction,genId} = useApp();
  const [showModal,setShowModal] = useState(false);
  const [selectedAssessment,setSelectedAssessment] = useState(null);
  const [activeTab,setActiveTab] = useState("log");
  const [form,setForm] = useState({type:"Internal",assessor:"",date:"",period:"",overall:"Generally Conforms",findings:""});
  const [stdRatings,setStdRatings] = useState({});

  const STANDARDS=[
    {std:"1000",name:"Purpose, Authority, and Responsibility"},
    {std:"1100",name:"Independence and Objectivity"},
    {std:"1110",name:"Organizational Independence"},
    {std:"1120",name:"Individual Objectivity"},
    {std:"1200",name:"Proficiency and Due Professional Care"},
    {std:"1300",name:"Quality Assurance and Improvement Program"},
    {std:"2000",name:"Managing the Internal Audit Activity"},
    {std:"2100",name:"Nature of Work"},
    {std:"2200",name:"Engagement Planning"},
    {std:"2300",name:"Performing the Engagement"},
    {std:"2400",name:"Communicating Results"},
    {std:"2410",name:"Criteria for Communicating"},
    {std:"2500",name:"Monitoring Progress"},
    {std:"2600",name:"Communicating the Acceptance of Risks"},
    {std:"1000-2600",name:"Overall IIA Standards Conformance"}
  ];

  function initStdRatings(){ const r={}; STANDARDS.forEach(s=>{ r[s.std]="Conforms"; }); return r; }

  function openNew(){
    setForm({type:"Internal",assessor:"",date:"",period:"",overall:"Generally Conforms",findings:""});
    setStdRatings(initStdRatings());
    setSelectedAssessment(null);
    setShowModal(true);
  }

  function viewAssessment(q){ setSelectedAssessment(q); setActiveTab("detail"); }

  function save(){
    if(!form.assessor||!form.date)return;
    const standards=STANDARDS.map(s=>({std:s.std,name:s.name,rating:stdRatings[s.std]||"Conforms"}));
    const entry={id:genId("q"),...form,standards};
    setQaip(prev=>[...prev,entry]);
    logAction("QAIP Assessment Added","New "+form.type+" assessment for period: "+form.period);
    setShowModal(false);
  }

  function getConformanceScore(assessment){
    if(!assessment.standards)return 0;
    const total=assessment.standards.length;
    const conforms=assessment.standards.filter(s=>s.rating==="Conforms").length;
    const partial=assessment.standards.filter(s=>s.rating==="Partially Conforms").length;
    return Math.round(((conforms+(partial*0.5))/total)*100);
  }

  function ratingColor(r){ return r==="Conforms"?"status-completed":r==="Partially Conforms"?"status-inreview":"status-overdue"; }
  function overallColor(o){ return o==="Generally Conforms"?"status-completed":o==="Partially Conforms"?"status-inreview":"status-overdue"; }

  const latestScore=qaip.length>0?getConformanceScore([...qaip].sort((a,b)=>b.date.localeCompare(a.date))[0]):0;

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Quality Assurance & Improvement Program</h1>
          <p className="text-gray-500 text-sm mt-1">IIA Standards conformance assessments</p>
        </div>
        {canAccess(["CAE","Audit Manager"])&&<Btn onClick={openNew}>+ Add Assessment</Btn>}
      </div>

      {/* Score and summary */}
      <div className="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
        <Card className="lg:col-span-1 flex flex-col items-center justify-center">
          <p className="text-sm text-gray-500 mb-2">Overall Conformance Score</p>
          <ProgressRing percent={latestScore} size={100} stroke={8} color={latestScore>=80?"#10b981":latestScore>=60?"#f59e0b":"#ef4444"}/>
          <p className="text-xs text-gray-400 mt-2">Latest Assessment</p>
        </Card>
        <div className="lg:col-span-3 grid grid-cols-3 gap-3">
          {[["Generally Conforms","Fully meets IIA Standards requirements","#10b981","bg-green-50 border-green-200"],
            ["Partially Conforms","Gaps exist; improvements needed","#f59e0b","bg-yellow-50 border-yellow-200"],
            ["Does Not Conform","Significant deficiencies identified","#ef4444","bg-red-50 border-red-200"]].map(([label,desc,color,cls])=>(
            <div key={label} className={"card p-4 border "+cls}>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-3 h-3 rounded-full" style={{background:color}}/>
                <span className="font-semibold text-sm text-gray-800">{label}</span>
              </div>
              <p className="text-xs text-gray-500">{desc}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div className="border-b border-gray-200 mb-4">
        <div className="flex">
          {[["log","Assessment Log"],["detail","Assessment Detail"],["standards","Standards Checklist"]].map(([id,label])=>(
            <button key={id} className={"tab-btn "+(activeTab===id?"active":"")} onClick={()=>setActiveTab(id)}>{label}</button>
          ))}
        </div>
      </div>

      {activeTab==="log"&&(
        <Card padding="p-0">
          <table className="w-full">
            <thead><tr className="table-header">
              <th className="px-4 py-3 text-left">Type</th>
              <th className="px-4 py-3 text-left">Assessor</th>
              <th className="px-4 py-3 text-left">Date</th>
              <th className="px-4 py-3 text-left">Period Covered</th>
              <th className="px-4 py-3 text-left">Overall Rating</th>
              <th className="px-4 py-3 text-left">Score</th>
              <th className="px-4 py-3 text-center">Actions</th>
            </tr></thead>
            <tbody>
              {qaip.map(q=>(
                <tr key={q.id} className="table-row">
                  <td className="px-4 py-3"><span className={"badge "+(q.type==="External"?"bg-purple-50 text-purple-700":"bg-blue-50 text-blue-700")}>{q.type}</span></td>
                  <td className="px-4 py-3 font-medium text-sm text-gray-800">{q.assessor}</td>
                  <td className="px-4 py-3 text-sm text-gray-600">{q.date}</td>
                  <td className="px-4 py-3 text-sm text-gray-600">{q.period}</td>
                  <td className="px-4 py-3"><span className={"badge "+overallColor(q.overall)}>{q.overall}</span></td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-20 bg-gray-100 rounded-full h-2">
                        <div className="h-2 rounded-full bg-blue-500" style={{width:getConformanceScore(q)+"%"}}/>
                      </div>
                      <span className="text-sm font-semibold text-gray-700">{getConformanceScore(q)}%</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center">
                    <button onClick={()=>viewAssessment(q)} className="text-blue-500 hover:text-blue-700 text-xs font-medium">View Details</button>
                  </td>
                </tr>
              ))}
              {qaip.length===0&&<tr><td colSpan="7" className="text-center text-gray-400 py-10 text-sm">No assessments recorded.</td></tr>}
            </tbody>
          </table>
        </Card>
      )}

      {activeTab==="detail"&&selectedAssessment&&(
        <div>
          <div className="flex items-center gap-3 mb-4">
            <h3 className="font-semibold text-gray-900">{selectedAssessment.type} Assessment &mdash; {selectedAssessment.period}</h3>
            <span className={"badge "+overallColor(selectedAssessment.overall)}>{selectedAssessment.overall}</span>
            <span className="text-sm text-gray-500">{selectedAssessment.date} &bull; Assessed by {selectedAssessment.assessor}</span>
          </div>
          {selectedAssessment.findings&&<div className="bg-amber-50 border border-amber-200 p-4 rounded-lg mb-4 text-sm text-amber-800">{selectedAssessment.findings}</div>}
          <Card padding="p-0">
            <table className="w-full">
              <thead><tr className="table-header">
                <th className="px-4 py-3 text-left">Standard</th>
                <th className="px-4 py-3 text-left">Description</th>
                <th className="px-4 py-3 text-left">Rating</th>
              </tr></thead>
              <tbody>
                {(selectedAssessment.standards||[]).map(s=>(
                  <tr key={s.std} className="table-row">
                    <td className="px-4 py-3"><span className="font-mono text-sm font-semibold text-gray-600">{s.std}</span></td>
                    <td className="px-4 py-3 text-sm text-gray-700">{s.name}</td>
                    <td className="px-4 py-3"><span className={"badge "+ratingColor(s.rating)}>{s.rating}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {activeTab==="detail"&&!selectedAssessment&&(
        <div className="text-center py-12 text-gray-400">
          <div className="text-4xl mb-3">&#9733;</div>
          <p>Select an assessment from the Assessment Log to view details.</p>
        </div>
      )}

      {activeTab==="standards"&&(
        <div>
          <div className="mb-4">
            <h3 className="font-semibold text-gray-900 mb-1">IIA Standards Self-Assessment Checklist</h3>
            <p className="text-sm text-gray-500">Rate conformance with each IIA Standard based on current practices</p>
          </div>
          <Card padding="p-0">
            <table className="w-full">
              <thead><tr className="table-header">
                <th className="px-4 py-3 text-left">Standard</th>
                <th className="px-4 py-3 text-left">Description</th>
                <th className="px-4 py-3 text-left">Latest Rating (Latest Assessment)</th>
                <th className="px-4 py-3 text-left">Trend</th>
              </tr></thead>
              <tbody>
                {STANDARDS.slice(0,11).map(s=>{
                  const latest=qaip.length>0?[...qaip].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
                  const rating=latest?.standards?.find(r=>r.std===s.std)?.rating||"Not Assessed";
                  const prev=qaip.length>1?[...qaip].sort((a,b)=>b.date.localeCompare(a.date))[1]:null;
                  const prevRating=prev?.standards?.find(r=>r.std===s.std)?.rating||null;
                  let trend="&#8212;";
                  if(prevRating){
                    const rMap={"Conforms":3,"Partially Conforms":2,"Does Not Conform":1};
                    const diff=(rMap[rating]||2)-(rMap[prevRating]||2);
                    trend=diff>0?"&#8593; Improved":diff<0?"&#8595; Declined":"&#8212; Same";
                  }
                  return (
                    <tr key={s.std} className="table-row">
                      <td className="px-4 py-3"><span className="font-mono text-sm font-semibold text-blue-600">{s.std}</span></td>
                      <td className="px-4 py-3 text-sm text-gray-700">{s.name}</td>
                      <td className="px-4 py-3"><span className={"badge "+(rating==="Not Assessed"?"bg-gray-100 text-gray-500":ratingColor(rating))}>{rating}</span></td>
                      <td className="px-4 py-3 text-sm" dangerouslySetInnerHTML={{__html:trend}}/>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      <Modal open={showModal} onClose={()=>setShowModal(false)} title="Add QAIP Assessment" width="max-w-2xl">
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Assessment Type" value={form.type} onChange={v=>setForm(p=>({...p,type:v}))} options={["Internal","External"]}/>
          <Inp label="Assessor" value={form.assessor} onChange={v=>setForm(p=>({...p,assessor:v}))} placeholder="Name or firm" required/>
          <Inp label="Assessment Date" value={form.date} onChange={v=>setForm(p=>({...p,date:v}))} type="date" required/>
          <Inp label="Period Covered" value={form.period} onChange={v=>setForm(p=>({...p,period:v}))} placeholder="e.g. 2024 or H1 2024"/>
        </div>
        <Sel label="Overall Rating" value={form.overall} onChange={v=>setForm(p=>({...p,overall:v}))} options={["Generally Conforms","Partially Conforms","Does Not Conform"]}/>
        <Txta label="Key Findings / Observations" value={form.findings} onChange={v=>setForm(p=>({...p,findings:v}))} rows={3}/>
        <div className="border-t pt-3 mt-2">
          <p className="text-sm font-medium text-gray-700 mb-2">Standards Ratings</p>
          <div className="max-h-64 overflow-y-auto space-y-2">
            {STANDARDS.map(s=>(
              <div key={s.std} className="flex items-center gap-3">
                <span className="font-mono text-xs text-gray-500 w-16">{s.std}</span>
                <span className="text-sm text-gray-700 flex-1">{s.name}</span>
                <select value={stdRatings[s.std]||"Conforms"} onChange={e=>setStdRatings(p=>({...p,[s.std]:e.target.value}))} className="select-field" style={{maxWidth:160}}>
                  <option>Conforms</option>
                  <option>Partially Conforms</option>
                  <option>Does Not Conform</option>
                </select>
              </div>
            ))}
          </div>
        </div>
        <div className="flex justify-end gap-3 mt-4">
          <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
          <Btn onClick={save}>Save Assessment</Btn>
        </div>
      </Modal>
    </div>
  );
}
